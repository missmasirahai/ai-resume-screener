<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Screener</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Resume Screener</h1>
      <p>Upload a resume PDF and get an instant AI-powered score</p>
    </header>

    <div class="upload-box" id="upload-box">
      <div class="upload-icon">📄</div>
      <p>Drag and drop a PDF resume here</p>
      <p class="sub">or</p>
      <label class="btn" for="file-input">Choose PDF File</label>
      <input type="file" id="file-input" accept=".pdf" hidden/>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>AI is analyzing the resume. Please wait...</p>
    </div>

    <div id="result-card" class="hidden"></div>
  </div>
  <script src="/static/js/main.js"></script>
</body>
</html>
